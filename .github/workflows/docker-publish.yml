name: Deploy

on:
  push:
    branches: ["main"]
    tags: ['v*.*.*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: liukonen/flagfairway

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      #################################
      # Build UI → export locally
      #################################
      - name: Build UI artifact
        run: |
          docker buildx build \
            -f Dockerfile.ui \
            --cache-to type=gha,mode=max \
            --output type=local,dest=./ui-build \
            --output type=local,dest=./ui-build \
            .

      #################################
      # Build backend → export both arches
      #################################
      - name: Build backend binaries
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -f Dockerfile.backend \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --output type=local,dest=./backend-bin \
            .

      #################################
      # Build final multi-arch image
      #################################
      - name: Build and push deploy image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          file: Dockerfile.deploy
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max